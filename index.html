<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>限定公開対応 YouTube DL (単一HTML)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .container {
            background: #1a1a1a;
            max-width: 680px;
            width: 100%;
            padding: 32px 24px;
            border-radius: 24px;
            border: 1px solid #2a2a2a;
            box-shadow: 0 20px 60px rgba(0,0,0,0.9);
        }
        h1 { color: #fff; font-size: 24px; text-align: center; letter-spacing: -0.5px; }
        .sub {
            color: #888;
            text-align: center;
            font-size: 13px;
            margin: 6px 0 24px 0;
            border-bottom: 1px solid #2a2a2a;
            padding-bottom: 16px;
        }
        .sub .badge { background: #ff0000; color: #fff; padding: 2px 12px; border-radius: 20px; font-size: 11px; margin-left: 6px; }
        .input-group { display: flex; flex-direction: column; gap: 10px; }
        .input-group input {
            padding: 14px 16px;
            font-size: 15px;
            border: 2px solid #333;
            border-radius: 14px;
            background: #0d0d0d;
            color: #fff;
            outline: none;
            transition: 0.2s;
            width: 100%;
        }
        .input-group input:focus { border-color: #ff0000; box-shadow: 0 0 0 3px rgba(255,0,0,0.12); }
        .input-group input::placeholder { color: #555; }
        .btn-download {
            padding: 15px;
            font-size: 17px;
            font-weight: 700;
            background: #ff0000;
            color: #fff;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: 0.15s;
            width: 100%;
        }
        .btn-download:hover { background: #cc0000; transform: scale(1.01); }
        .btn-download:disabled { background: #444; cursor: not-allowed; transform: none; }
        #status {
            margin-top: 18px;
            padding: 14px 16px;
            border-radius: 14px;
            background: #0d0d0d;
            border: 1px solid #2a2a2a;
            color: #ccc;
            font-size: 14px;
            line-height: 1.6;
            min-height: 56px;
            word-break: break-all;
        }
        #status .success { color: #4caf50; font-weight: bold; }
        #status .error { color: #ff5555; font-weight: bold; }
        #status .warn { color: #ffaa00; }
        .result-area { margin-top: 16px; display: flex; flex-direction: column; gap: 10px; }
        .result-item {
            background: #0d0d0d;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .result-item .label { color: #aaa; font-size: 13px; }
        .result-item .label strong { color: #fff; }
        .result-item .dl-link {
            background: #2a2a2a;
            color: #fff;
            padding: 7px 18px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            transition: 0.2s;
            border: 1px solid #444;
        }
        .result-item .dl-link:hover { background: #ff0000; border-color: #ff0000; }
        .footer-tips {
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid #2a2a2a;
            color: #666;
            font-size: 12px;
            line-height: 1.7;
        }
        .footer-tips strong { color: #aaa; }
        .footer-tips .hl { color: #ffaa00; }
        .footer-tips .note { color: #555; font-size: 11px; }
        @media (max-width: 480px) { .container { padding: 16px; } h1 { font-size: 20px; } }
    </style>
</head>
<body>
<div class="container">
    <h1>⬇️ YouTube 限定公開対応 DL</h1>
    <div class="sub">公開・限定公開どちらも可 <span class="badge">アカウント不要</span></div>

    <div class="input-group">
        <input type="text" id="urlInput" placeholder="YouTube URL を貼り付けてください" autofocus>
        <button class="btn-download" id="downloadBtn">🚀 解析＆ダウンロード</button>
    </div>

    <div id="status">📌 URLを入力して「解析」を押してください。</div>
    <div id="resultContainer" class="result-area"></div>

    <div class="footer-tips">
        <p>📱 <strong>iPhoneで写真フォルダに保存</strong> → リンクを<strong>長押し</strong>して「ビデオを保存」</p>
        <p class="note">⚠️ このツールは複数のCORSプロキシを経由してYouTubeを直接解析します。<br>
        限定公開動画も理論上は対応していますが、YouTubeの構造変更やプロキシの制限で失敗する場合があります。<br>
        <span class="hl">💡 失敗する場合: ページを再読み込みして再試行するか、別の時間帯にお試しください。</span></p>
    </div>
</div>

<script>
    (function() {
        const urlInput = document.getElementById('urlInput');
        const downloadBtn = document.getElementById('downloadBtn');
        const statusDiv = document.getElementById('status');
        const resultContainer = document.getElementById('resultContainer');

        function extractVideoId(url) {
            const match = url.match(/(?:v=|\/)([0-9A-Za-z_-]{11})(?:[?&]|$)/);
            return match ? match[1] : null;
        }

        function setStatus(msg, type = 'info') {
            statusDiv.innerHTML = msg;
            statusDiv.className = type;
        }

        function clearResults() {
            resultContainer.innerHTML = '';
        }

        function renderDownloadLinks(videoData) {
            clearResults();
            let html = '';
            if (videoData.progressive) {
                html += `
                    <div class="result-item">
                        <span class="label">🎬 音声＋動画 (プログレッシブ) <strong>${videoData.quality || '高画質'}</strong></span>
                        <a href="${videoData.progressive}" class="dl-link" download="${videoData.title || 'video'}.mp4">⬇ 保存</a>
                    </div>
                `;
            }
            if (videoData.videoOnly) {
                html += `
                    <div class="result-item">
                        <span class="label">🎥 動画のみ (音声なし) <strong>${videoData.videoQuality || ''}</strong></span>
                        <a href="${videoData.videoOnly}" class="dl-link" download="${videoData.title || 'video'}_video.mp4">⬇ 保存</a>
                    </div>
                `;
            }
            if (videoData.audioOnly) {
                html += `
                    <div class="result-item">
                        <span class="label">🎵 音声のみ</span>
                        <a href="${videoData.audioOnly}" class="dl-link" download="${videoData.title || 'video'}_audio.mp4">⬇ 保存</a>
                    </div>
                `;
            }
            if (!html) {
                html = `<div class="result-item"><span class="label" style="color:#ff5555;">❌ ダウンロード可能なストリームが見つかりませんでした。</span></div>`;
            }
            resultContainer.innerHTML = html;
        }

        // ---------- 複数プロキシを順に試行 ----------
        async function fetchWithProxy(videoId) {
            const proxyList = [
                // 信頼性の高いプロキシを優先
                (id) => `https://api.allorigins.win/raw?url=${encodeURIComponent('https://www.youtube.com/watch?v=' + id)}`,
                (id) => `https://corsproxy.io/?url=${encodeURIComponent('https://www.youtube.com/watch?v=' + id)}`,
                (id) => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent('https://www.youtube.com/watch?v=' + id)}`,
                (id) => `https://corsproxy.org/?${encodeURIComponent('https://www.youtube.com/watch?v=' + id)}`,
            ];

            for (const proxyFn of proxyList) {
                try {
                    const proxyUrl = proxyFn(videoId);
                    const res = await fetch(proxyUrl, {
                        signal: AbortSignal.timeout(15000),
                        headers: { 'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36' }
                    });
                    if (!res.ok) continue;
                    const html = await res.text();
                    if (html.length > 10000) { // 有効なHTMLが返ってきた
                        return html;
                    }
                } catch (e) {
                    // 次のプロキシへ
                }
            }
            return null;
        }

        // ---------- HTMLから動画情報を抽出 (堅牢化) ----------
        function parseYouTubeHTML(html) {
            try {
                // 方法1: ytInitialPlayerResponse を抽出 (最も確実)
                let match = html.match(/var ytInitialPlayerResponse\s*=\s*({.+?});/s);
                if (!match) {
                    // 別のパターン
                    match = html.match(/ytInitialPlayerResponse\s*=\s*({.+?});/s);
                }
                if (!match) {
                    // さらに別のパターン (圧縮されたJS内)
                    match = html.match(/ytInitialPlayerResponse\s*=\s*({.+?})\s*;/s);
                }
                if (!match) {
                    throw new Error('ytInitialPlayerResponse が見つかりません');
                }

                const data = JSON.parse(match[1]);
                const streamingData = data.streamingData;
                if (!streamingData) throw new Error('streamingData が見つかりません');

                // タイトルを取得
                const title = data.videoDetails?.title || 'video';

                // フォーマットを収集
                const formats = streamingData.formats || [];
                const adaptiveFormats = streamingData.adaptiveFormats || [];
                const allFormats = [...formats, ...adaptiveFormats];

                if (allFormats.length === 0) throw new Error('ストリームがありません');

                // プログレッシブ (音声付き) を抽出
                const progressive = formats.filter(f => f.hasAudio && f.hasVideo);
                // 動画のみ (音声なし)
                const videoOnly = adaptiveFormats.filter(f => f.mimeType && f.mimeType.includes('video'));
                // 音声のみ
                const audioOnly = adaptiveFormats.filter(f => f.mimeType && f.mimeType.includes('audio'));

                // 高画質順にソート
                const sortByHeight = (arr) => arr.sort((a, b) => (b.height || 0) - (a.height || 0));
                sortByHeight(progressive);
                sortByHeight(videoOnly);
                const sortByBitrate = (arr) => arr.sort((a, b) => (b.bitrate || 0) - (a.bitrate || 0));
                sortByBitrate(audioOnly);

                const result = {
                    title: title,
                    progressive: progressive.length > 0 ? progressive[0].url : null,
                    quality: progressive.length > 0 ? (progressive[0].qualityLabel || `${progressive[0].height}p`) : null,
                    videoOnly: videoOnly.length > 0 ? videoOnly[0].url : null,
                    videoQuality: videoOnly.length > 0 ? (videoOnly[0].qualityLabel || `${videoOnly[0].height}p`) : null,
                    audioOnly: audioOnly.length > 0 ? audioOnly[0].url : null,
                };

                // プログレッシブがない場合、videoOnlyがあればそれを使う
                if (!result.progressive && result.videoOnly) {
                    result.progressive = result.videoOnly;
                    result.quality = result.videoQuality;
                }

                return result;
            } catch (e) {
                console.error('Parse error:', e);
                throw new Error('動画情報の解析に失敗しました: ' + e.message);
            }
        }

        // ---------- メイン実行 ----------
        async function handleDownload() {
            const url = urlInput.value.trim();
            if (!url) {
                alert('YouTubeのURLを入力してください。');
                return;
            }
            const videoId = extractVideoId(url);
            if (!videoId) {
                setStatus('❌ 無効なYouTube URLです。 (動画IDが取得できません)', 'error');
                return;
            }

            downloadBtn.disabled = true;
            downloadBtn.textContent = '⏳ 解析中...';
            clearResults();
            setStatus(`🔍 動画ID: ${videoId} を取得中... (複数プロキシを試行)`, 'info');

            try {
                // プロキシ経由でHTMLを取得
                setStatus(`🔍 プロキシ経由でYouTubeページを取得中... (最大15秒)`, 'info');
                const html = await fetchWithProxy(videoId);

                if (!html) {
                    setStatus(`❌ 全てのプロキシが応答しませんでした。<br>
                              <span class="warn">📌 考えられる原因:</span><br>
                              ・プロキシサービスが一時的に制限中（数分待って再試行）<br>
                              ・動画が削除されている、または地域制限がかかっている<br>
                              ・ネットワーク環境でプロキシがブロックされている`, 'error');
                    downloadBtn.disabled = false;
                    downloadBtn.textContent = '🚀 解析＆ダウンロード';
                    return;
                }

                setStatus(`🔍 HTML取得成功 (${html.length}文字)。動画情報を解析中...`, 'info');

                // パース
                const parsed = parseYouTubeHTML(html);

                // 結果表示
                const qualityLabel = parsed.quality || '高画質';
                setStatus(`✅ <span class="success">取得成功!</span> タイトル: ${parsed.title} | 画質: ${qualityLabel}`, 'success');

                renderDownloadLinks(parsed);

                // 自動ダウンロード実行 (プログレッシブがあれば)
                if (parsed.progressive) {
                    const a = document.createElement('a');
                    a.href = parsed.progressive;
                    a.download = `${parsed.title || 'video'}.mp4`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    setStatus(`✅ <span class="success">自動ダウンロードを開始しました。</span><br>
                              タイトル: ${parsed.title} | 画質: ${qualityLabel}<br>
                              <span style="font-size:12px;color:#888;">自動で始まらない場合は上のリンクをクリックしてください。</span>`, 'success');
                }

            } catch (err) {
                console.error(err);
                setStatus(`❌ エラー: ${err.message}<br>
                          <span class="warn">💡 ページを再読み込みして再試行するか、数分待ってからもう一度お試しください。</span>`, 'error');
            } finally {
                downloadBtn.disabled = false;
                downloadBtn.textContent = '🚀 解析＆ダウンロード';
            }
        }

        // イベント
        downloadBtn.addEventListener('click', handleDownload);
        urlInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleDownload(); });
        urlInput.focus();
    })();
</script>
</body>
</html>
