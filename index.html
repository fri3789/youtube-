<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>究極のYouTubeダウンローダー (単一HTML)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #0f0f0f;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: #1a1a1a;
            max-width: 640px;
            width: 100%;
            padding: 40px 30px;
            border-radius: 24px;
            border: 1px solid #333;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            transition: 0.3s;
        }
        h1 {
            color: #fff;
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }
        .sub {
            color: #aaa;
            text-align: center;
            font-size: 14px;
            margin-bottom: 30px;
            border-bottom: 1px solid #2a2a2a;
            padding-bottom: 20px;
        }
        .sub span {
            background: #ff0000;
            color: #fff;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-left: 6px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .input-group input {
            padding: 16px 18px;
            font-size: 16px;
            border: 2px solid #333;
            border-radius: 14px;
            background: #0a0a0a;
            color: #fff;
            outline: none;
            transition: 0.2s;
            width: 100%;
        }
        .input-group input:focus {
            border-color: #ff0000;
            box-shadow: 0 0 0 3px rgba(255,0,0,0.2);
        }
        .input-group input::placeholder {
            color: #666;
        }
        .btn-download {
            padding: 16px;
            font-size: 18px;
            font-weight: 700;
            background: #ff0000;
            color: #fff;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: 0.15s;
            width: 100%;
            letter-spacing: 0.5px;
        }
        .btn-download:hover {
            background: #cc0000;
            transform: scale(1.01);
        }
        .btn-download:disabled {
            background: #444;
            cursor: not-allowed;
            transform: none;
        }
        #status {
            margin-top: 20px;
            padding: 16px;
            border-radius: 14px;
            background: #0d0d0d;
            border: 1px solid #2a2a2a;
            color: #ddd;
            font-size: 14px;
            line-height: 1.6;
            min-height: 70px;
            word-break: break-all;
        }
        #status .success { color: #4caf50; font-weight: bold; }
        #status .error { color: #ff5555; font-weight: bold; }
        #status .info { color: #ffaa00; }
        .result-area {
            margin-top: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .result-item {
            background: #0d0d0d;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 14px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .result-item .label {
            color: #aaa;
            font-size: 13px;
        }
        .result-item .label strong {
            color: #fff;
        }
        .result-item .dl-link {
            background: #2a2a2a;
            color: #fff;
            padding: 8px 16px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            transition: 0.2s;
            border: 1px solid #444;
        }
        .result-item .dl-link:hover {
            background: #ff0000;
            border-color: #ff0000;
        }
        .footer-tips {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #2a2a2a;
            color: #666;
            font-size: 13px;
            line-height: 1.7;
        }
        .footer-tips strong { color: #aaa; }
        .footer-tips .highlight { color: #ffaa00; }
        @media (max-width: 480px) {
            .container { padding: 20px 16px; }
            h1 { font-size: 22px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⬇️ YouTube ダウンローダー</h1>
        <div class="sub">高画質・音声付きを最優先 <span>v3.0</span></div>

        <div class="input-group">
            <input type="text" id="urlInput" placeholder="https://www.youtube.com/watch?v=..." autofocus>
            <button class="btn-download" id="downloadBtn">🚀 解析＆ダウンロード</button>
        </div>

        <div id="status">📌 動画のURLを入力して「解析」を押してください。</div>

        <div id="resultContainer" class="result-area"></div>

        <div class="footer-tips">
            <p>📱 <strong>iPhoneで写真フォルダに保存する方法</strong></p>
            <p>① 下の <span class="highlight">「ビデオを保存」</span> リンクを<strong>長押し</strong> → 「ビデオを保存」をタップ</p>
            <p>② またはダウンロード後、ファイルアプリで共有 → 「ビデオを保存」</p>
            <p style="margin-top:10px;color:#555;font-size:12px;">⚠️ このツールは非公式API・プロキシを利用します。権利者を尊重し個人利用の範囲でお使いください。</p>
        </div>
    </div>

    <script>
        (function() {
            const urlInput = document.getElementById('urlInput');
            const downloadBtn = document.getElementById('downloadBtn');
            const statusDiv = document.getElementById('status');
            const resultContainer = document.getElementById('resultContainer');

            // ---------- コアロジック ----------
            function extractVideoId(url) {
                const match = url.match(/(?:v=|\/)([0-9A-Za-z_-]{11})(?:[?&]|$)/);
                return match ? match[1] : null;
            }

            function setStatus(msg, type = 'info') {
                statusDiv.innerHTML = msg;
                statusDiv.className = type;
            }

            function clearResults() {
                resultContainer.innerHTML = '';
            }

            function renderDownloadLinks(videoData) {
                clearResults();
                let html = '';

                // 1. プログレッシブ (音声+動画) が最優先
                if (videoData.bestProgressive) {
                    const p = videoData.bestProgressive;
                    html += `
                        <div class="result-item">
                            <span class="label">🎬 音声＋動画 (プログレッシブ) <strong>${p.height}p</strong></span>
                            <a href="${p.url}" class="dl-link" download="${videoData.title || 'video'}.mp4">⬇ ビデオを保存</a>
                        </div>
                    `;
                }

                // 2. 動画のみ (高画質)
                if (videoData.bestVideo) {
                    const v = videoData.bestVideo;
                    html += `
                        <div class="result-item">
                            <span class="label">🎥 動画のみ (音声なし) <strong>${v.height}p</strong></span>
                            <a href="${v.url}" class="dl-link" download="${videoData.title || 'video'}_video.mp4">⬇ ビデオを保存</a>
                        </div>
                    `;
                }

                // 3. 音声のみ
                if (videoData.bestAudio) {
                    const a = videoData.bestAudio;
                    html += `
                        <div class="result-item">
                            <span class="label">🎵 音声のみ (オーディオ) <strong>${a.bitrate ? Math.round(a.bitrate/1000) + 'kbps' : ''}</strong></span>
                            <a href="${a.url}" class="dl-link" download="${videoData.title || 'video'}_audio.mp4">⬇ 音声を保存</a>
                        </div>
                    `;
                }

                if (!html) {
                    html = `<div class="result-item"><span class="label" style="color:#ff5555;">❌ ダウンロード可能なストリームが見つかりませんでした。</span></div>`;
                }

                resultContainer.innerHTML = html;
            }

            // ---------- 取得エンジン1: Piped API (複数インスタンス) ----------
            async function fetchFromPiped(videoId) {
                const instances = [
                    'https://pipedapi.kavin.rocks',
                    'https://pipedapi-libre.kavin.rocks',
                    'https://pipedapi.leptons.xyz',
                    'https://piped.video'
                ];
                for (const base of instances) {
                    try {
                        const url = `${base}/streams/${videoId}`;
                        const res = await fetch(url, { signal: AbortSignal.timeout(5000) });
                        if (!res.ok) continue;
                        const data = await res.json();
                        if (data.videoStreams || data.audioStreams) {
                            return data;
                        }
                    } catch (e) {
                        // 次のインスタンスへ
                    }
                }
                return null;
            }

            // ---------- 取得エンジン2: Invidious API ----------
            async function fetchFromInvidious(videoId) {
                const instances = [
                    'https://yewtu.be',
                    'https://invidious.private.coffee',
                    'https://inv.riverside.rocks'
                ];
                for (const base of instances) {
                    try {
                        const url = `${base}/api/v1/videos/${videoId}`;
                        const res = await fetch(url, { signal: AbortSignal.timeout(5000) });
                        if (!res.ok) continue;
                        const data = await res.json();
                        if (data.formatStreams || data.adaptiveFormats) {
                            return data;
                        }
                    } catch (e) {}
                }
                return null;
            }

            // ---------- 取得エンジン3: プロキシ経由でYouTube直スクレイピング (最終手段) ----------
            async function fetchFromYouTubeDirect(videoId) {
                const proxyUrls = [
                    `https://api.allorigins.win/raw?url=${encodeURIComponent('https://www.youtube.com/watch?v=' + videoId)}`,
                    `https://corsproxy.io/?url=${encodeURIComponent('https://www.youtube.com/watch?v=' + videoId)}`
                ];

                for (const proxyUrl of proxyUrls) {
                    try {
                        const res = await fetch(proxyUrl, { signal: AbortSignal.timeout(10000) });
                        if (!res.ok) continue;
                        const html = await res.text();

                        // ytInitialPlayerResponse を抽出
                        const regex = /var ytInitialPlayerResponse\s*=\s*({.+?});/s;
                        const match = html.match(regex);
                        if (!match) continue;

                        const playerResponse = JSON.parse(match[1]);
                        const streamingData = playerResponse.streamingData;
                        if (!streamingData) continue;

                        const formats = streamingData.formats || [];
                        const adaptiveFormats = streamingData.adaptiveFormats || [];

                        // 整形してPiped風に変換 (後続のパーサーで扱いやすくする)
                        const videoStreams = [];
                        const audioStreams = [];

                        // プログレッシブ (formats) はvideo+audio込み
                        for (const f of formats) {
                            const mime = f.mimeType || '';
                            if (mime.includes('video/mp4') || mime.includes('video/webm')) {
                                videoStreams.push({
                                    url: f.url,
                                    height: f.height || 0,
                                    quality: f.qualityLabel || `${f.height}p`,
                                    bitrate: f.bitrate,
                                    mimeType: mime,
                                    isProgressive: true
                                });
                            }
                        }

                        // アダプティブ (adaptiveFormats)
                        for (const f of adaptiveFormats) {
                            const mime = f.mimeType || '';
                            if (mime.includes('video')) {
                                videoStreams.push({
                                    url: f.url,
                                    height: f.height || 0,
                                    quality: f.qualityLabel || `${f.height}p`,
                                    bitrate: f.bitrate,
                                    mimeType: mime,
                                    isProgressive: false
                                });
                            } else if (mime.includes('audio')) {
                                audioStreams.push({
                                    url: f.url,
                                    bitrate: f.bitrate || 0,
                                    mimeType: mime,
                                    quality: f.qualityLabel || 'audio'
                                });
                            }
                        }

                        return {
                            title: playerResponse.videoDetails?.title || 'video',
                            videoStreams: videoStreams,
                            audioStreams: audioStreams,
                            _source: 'direct'
                        };
                    } catch (e) {
                        continue;
                    }
                }
                return null;
            }

            // ---------- データパーサー (高画質優先) ----------
            function parseBestStreams(data) {
                const result = {
                    title: data.title || 'video',
                    bestProgressive: null,
                    bestVideo: null,
                    bestAudio: null
                };

                // 1. 動画ストリームを整理 (プログレッシブ優先)
                let videoStreams = data.videoStreams || [];
                // プログレッシブ (音声付き) を分離
                const progressives = videoStreams.filter(s => s.isProgressive === true || (s.mimeType && s.mimeType.includes('video/mp4') && s.bitrate));
                const videosOnly = videoStreams.filter(s => !progressives.includes(s));

                // 高さ順ソート
                const sortByHeight = (arr) => arr.sort((a, b) => (b.height || 0) - (a.height || 0));
                sortByHeight(progressives);
                sortByHeight(videosOnly);

                if (progressives.length > 0) {
                    result.bestProgressive = progressives[0];
                }

                if (videosOnly.length > 0) {
                    result.bestVideo = videosOnly[0];
                }

                // 音声ストリーム (最高ビットレート)
                const audioStreams = data.audioStreams || [];
                if (audioStreams.length > 0) {
                    audioStreams.sort((a, b) => (b.bitrate || 0) - (a.bitrate || 0));
                    result.bestAudio = audioStreams[0];
                }

                // プログレッシブがない場合、videoOnlyがあればそれをメイン扱いにする
                if (!result.bestProgressive && result.bestVideo) {
                    result.bestProgressive = result.bestVideo; // 便宜上
                }

                return result;
            }

            // ---------- メイン実行 ----------
            async function handleDownload() {
                const url = urlInput.value.trim();
                if (!url) {
                    alert('YouTubeのURLを入力してください。');
                    return;
                }
                const videoId = extractVideoId(url);
                if (!videoId) {
                    setStatus('❌ 無効なYouTube URLです。 (動画IDが取得できません)', 'error');
                    return;
                }

                // UIロック
                downloadBtn.disabled = true;
                downloadBtn.textContent = '⏳ 解析中...';
                clearResults();
                setStatus(`🔍 動画ID: ${videoId} を複数のソースから探しています...`, 'info');

                try {
                    let rawData = null;
                    let source = '';

                    // ステージ1: Piped
                    setStatus(`🔍 [1/3] Piped API を試行中...`, 'info');
                    rawData = await fetchFromPiped(videoId);
                    if (rawData) {
                        source = 'Piped';
                        rawData.title = rawData.title || 'video';
                        // Pipedは videoStreams / audioStreams をそのまま持つ
                    }

                    // ステージ2: Invidious
                    if (!rawData) {
                        setStatus(`🔍 [2/3] Invidious API を試行中...`, 'info');
                        rawData = await fetchFromInvidious(videoId);
                        if (rawData) {
                            source = 'Invidious';
                            // Invidiousの形式をPiped風に変換
                            const videoStreams = [];
                            const audioStreams = [];
                            (rawData.formatStreams || []).forEach(f => {
                                if (f.type && f.type.includes('video')) {
                                    videoStreams.push({ url: f.url, height: f.height || 0, quality: f.qualityLabel, bitrate: f.bitrate, mimeType: f.type, isProgressive: true });
                                }
                            });
                            (rawData.adaptiveFormats || []).forEach(f => {
                                if (f.type && f.type.includes('video')) {
                                    videoStreams.push({ url: f.url, height: f.height || 0, quality: f.qualityLabel, bitrate: f.bitrate, mimeType: f.type, isProgressive: false });
                                } else if (f.type && f.type.includes('audio')) {
                                    audioStreams.push({ url: f.url, bitrate: f.bitrate, mimeType: f.type });
                                }
                            });
                            rawData = {
                                title: rawData.title || 'video',
                                videoStreams: videoStreams,
                                audioStreams: audioStreams
                            };
                        }
                    }

                    // ステージ3: プロキシ直スクレイピング (最終手段)
                    if (!rawData) {
                        setStatus(`🔍 [3/3] プロキシ経由でYouTube直取得を試行中... (時間がかかることがあります)`, 'info');
                        rawData = await fetchFromYouTubeDirect(videoId);
                        if (rawData) {
                            source = 'YouTube (Proxy)';
                        }
                    }

                    if (!rawData || (!rawData.videoStreams && !rawData.audioStreams)) {
                        setStatus(`❌ 全てのソースを試しましたが、動画情報を取得できませんでした。<br>URLが正しいか、動画が公開されているか確認してください。`, 'error');
                        downloadBtn.disabled = false;
                        downloadBtn.textContent = '🚀 解析＆ダウンロード';
                        return;
                    }

                    // パース
                    const parsed = parseBestStreams(rawData);
                    setStatus(`✅ <span class="success">取得成功!</span> ソース: ${source} | タイトル: ${parsed.title}`, 'success');

                    // レンダリング
                    renderDownloadLinks(parsed);

                } catch (err) {
                    console.error(err);
                    setStatus(`❌ 予期せぬエラー: ${err.message}`, 'error');
                } finally {
                    downloadBtn.disabled = false;
                    downloadBtn.textContent = '🚀 解析＆ダウンロード';
                }
            }

            // イベントバインド
            downloadBtn.addEventListener('click', handleDownload);
            urlInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') handleDownload();
            });

            // 初期フォーカス
            urlInput.focus();
        })();
    </script>
</body>
</html>
