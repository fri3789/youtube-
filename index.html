<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Cobalt搭載 究極のYouTube DL</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: #1a1a1a;
            max-width: 680px;
            width: 100%;
            padding: 40px 30px;
            border-radius: 28px;
            border: 1px solid #2a2a2a;
            box-shadow: 0 25px 60px rgba(0,0,0,0.9);
        }
        h1 { color: #fff; font-size: 26px; font-weight: 700; text-align: center; letter-spacing: -0.5px; }
        .sub {
            color: #888;
            text-align: center;
            font-size: 14px;
            margin: 6px 0 28px 0;
            border-bottom: 1px solid #2a2a2a;
            padding-bottom: 18px;
        }
        .sub span { background: #ff0000; color: #fff; padding: 2px 14px; border-radius: 20px; font-size: 12px; margin-left: 8px; }
        .input-group { display: flex; flex-direction: column; gap: 12px; }
        .input-group input {
            padding: 16px 18px;
            font-size: 16px;
            border: 2px solid #333;
            border-radius: 16px;
            background: #0d0d0d;
            color: #fff;
            outline: none;
            transition: 0.2s;
            width: 100%;
        }
        .input-group input:focus { border-color: #ff0000; box-shadow: 0 0 0 3px rgba(255,0,0,0.15); }
        .input-group input::placeholder { color: #555; }
        .btn-download {
            padding: 16px;
            font-size: 18px;
            font-weight: 700;
            background: #ff0000;
            color: #fff;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: 0.15s;
            width: 100%;
        }
        .btn-download:hover { background: #cc0000; transform: scale(1.01); }
        .btn-download:disabled { background: #444; cursor: not-allowed; transform: none; }
        #status {
            margin-top: 20px;
            padding: 16px 18px;
            border-radius: 16px;
            background: #0d0d0d;
            border: 1px solid #2a2a2a;
            color: #ccc;
            font-size: 14px;
            line-height: 1.6;
            min-height: 60px;
            word-break: break-all;
        }
        #status .success { color: #4caf50; font-weight: bold; }
        #status .error { color: #ff5555; font-weight: bold; }
        #status .info { color: #ffaa00; }
        .result-area {
            margin-top: 18px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .result-item {
            background: #0d0d0d;
            border: 1px solid #2a2a2a;
            border-radius: 14px;
            padding: 14px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .result-item .label { color: #aaa; font-size: 14px; }
        .result-item .label strong { color: #fff; }
        .result-item .dl-link {
            background: #2a2a2a;
            color: #fff;
            padding: 8px 20px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: 0.2s;
            border: 1px solid #444;
            white-space: nowrap;
        }
        .result-item .dl-link:hover { background: #ff0000; border-color: #ff0000; }
        .footer-tips {
            margin-top: 28px;
            padding-top: 18px;
            border-top: 1px solid #2a2a2a;
            color: #666;
            font-size: 13px;
            line-height: 1.7;
        }
        .footer-tips strong { color: #aaa; }
        .footer-tips .highlight { color: #ffaa00; }
        @media (max-width: 480px) { .container { padding: 20px 16px; } h1 { font-size: 22px; } }
    </style>
</head>
<body>
<div class="container">
    <h1>⬇️ 高画質 DL</h1>
    <div class="sub">Cobaltエンジン搭載 <span>安定版</span></div>

    <div class="input-group">
        <input type="text" id="urlInput" placeholder="YouTube URL を貼り付けてください" autofocus>
        <button class="btn-download" id="downloadBtn">🚀 解析＆ダウンロード</button>
    </div>

    <div id="status">📌 動画のURLを入力して「解析」を押してください。</div>
    <div id="resultContainer" class="result-area"></div>

    <div class="footer-tips">
        <p>📱 <strong>iPhoneで写真フォルダに保存</strong> → 下のリンクを<strong>長押し</strong>して「ビデオを保存」</p>
        <p style="margin-top:6px;color:#555;font-size:12px;">⚠️ このツールはCobalt・Pipedの非公開APIを利用します。個人利用の範囲でお使いください。</p>
    </div>
</div>

<script>
    (function() {
        const urlInput = document.getElementById('urlInput');
        const downloadBtn = document.getElementById('downloadBtn');
        const statusDiv = document.getElementById('status');
        const resultContainer = document.getElementById('resultContainer');

        function extractVideoId(url) {
            const match = url.match(/(?:v=|\/)([0-9A-Za-z_-]{11})(?:[?&]|$)/);
            return match ? match[1] : null;
        }

        function setStatus(msg, type = 'info') {
            statusDiv.innerHTML = msg;
            statusDiv.className = type;
        }

        function clearResults() {
            resultContainer.innerHTML = '';
        }

        function renderDirectDownload(url, title, qualityLabel = '高画質') {
            clearResults();
            resultContainer.innerHTML = `
                <div class="result-item">
                    <span class="label">🎬 音声＋動画 (プログレッシブ) <strong>${qualityLabel}</strong></span>
                    <a href="${url}" class="dl-link" download="${title || 'video'}.mp4">⬇ ビデオを保存</a>
                </div>
            `;
        }

        // ---------- エンジン1: Cobalt API (最優先・最も安定) ----------
        async function fetchFromCobalt(videoId) {
            try {
                const fullUrl = `https://www.youtube.com/watch?v=${videoId}`;
                const response = await fetch('https://api.cobalt.tools/api/json', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({
                        url: fullUrl,
                        videoQuality: 'max',        // 最高画質 (1080p/4Kなど)
                        audioFormat: 'best',
                        downloadMode: 'progressive'  // 音声付きで一括ダウンロード
                    }),
                    signal: AbortSignal.timeout(10000)
                });

                if (!response.ok) return null;
                const data = await response.json();

                // Cobaltのレスポンス: { status: "redirect", url: "..." } または { status: "error", text: "..." }
                if (data.status === 'redirect' && data.url) {
                    // 画質ラベルを取得 (可能な限り)
                    let qualityLabel = '最高画質';
                    if (data.picker && data.picker.video) {
                        qualityLabel = data.picker.video;
                    }
                    return {
                        title: 'video',
                        downloadUrl: data.url,
                        quality: qualityLabel,
                        _source: 'Cobalt'
                    };
                } else if (data.status === 'error') {
                    console.warn('Cobalt Error:', data.text);
                    return null;
                }
                return null;
            } catch (e) {
                console.warn('Cobalt fetch failed:', e.message);
                return null;
            }
        }

        // ---------- エンジン2: Piped API (Cobaltが落ちた時のバックアップ) ----------
        async function fetchFromPiped(videoId) {
            const instances = [
                'https://pipedapi.kavin.rocks',
                'https://pipedapi-libre.kavin.rocks',
                'https://pipedapi.leptons.xyz'
            ];
            for (const base of instances) {
                try {
                    const url = `${base}/streams/${videoId}`;
                    const res = await fetch(url, { signal: AbortSignal.timeout(5000) });
                    if (!res.ok) continue;
                    const data = await res.json();
                    if (!data.videoStreams || data.videoStreams.length === 0) continue;

                    // プログレッシブを最優先で探す
                    const progressives = data.videoStreams.filter(s => s.isProgressive === true);
                    let best = null;
                    if (progressives.length > 0) {
                        progressives.sort((a, b) => (b.height || 0) - (a.height || 0));
                        best = progressives[0];
                    } else {
                        // プログレッシブがなければ、動画のみの中で最高画質
                        const sorted = data.videoStreams.sort((a, b) => (b.height || 0) - (a.height || 0));
                        best = sorted[0];
                    }
                    if (best && best.url) {
                        return {
                            title: data.title || 'video',
                            downloadUrl: best.url,
                            quality: best.quality || `${best.height}p`,
                            _source: 'Piped'
                        };
                    }
                } catch (e) {}
            }
            return null;
        }

        // ---------- メイン実行 (Cobalt→Piped の順でフォールバック) ----------
        async function handleDownload() {
            const url = urlInput.value.trim();
            if (!url) {
                alert('YouTubeのURLを入力してください。');
                return;
            }
            const videoId = extractVideoId(url);
            if (!videoId) {
                setStatus('❌ 無効なYouTube URLです。 (動画IDが取得できません)', 'error');
                return;
            }

            downloadBtn.disabled = true;
            downloadBtn.textContent = '⏳ 解析中...';
            clearResults();
            setStatus(`🔍 動画ID: ${videoId} を取得中... (Cobaltエンジン)`, 'info');

            try {
                let result = null;

                // ステージ1: Cobalt (成功率が非常に高い)
                setStatus(`🔍 [1/2] Cobalt API で高画質を取得中...`, 'info');
                result = await fetchFromCobalt(videoId);
                if (result) {
                    setStatus(`✅ <span class="success">取得成功!</span> ソース: ${result._source} | 画質: ${result.quality}`, 'success');
                    renderDirectDownload(result.downloadUrl, result.title, result.quality);
                    downloadBtn.disabled = false;
                    downloadBtn.textContent = '🚀 解析＆ダウンロード';
                    return;
                }

                // ステージ2: Piped (Cobaltが応答しない場合のバックアップ)
                setStatus(`🔍 [2/2] Cobaltが応答しません。Piped API を試行中...`, 'info');
                result = await fetchFromPiped(videoId);
                if (result) {
                    setStatus(`✅ <span class="success">取得成功!</span> ソース: ${result._source} | 画質: ${result.quality}`, 'success');
                    renderDirectDownload(result.downloadUrl, result.title, result.quality);
                    downloadBtn.disabled = false;
                    downloadBtn.textContent = '🚀 解析＆ダウンロード';
                    return;
                }

                // 全て失敗
                setStatus(`❌ 全てのソース（Cobalt / Piped）を試しましたが、動画情報を取得できませんでした。<br>
                          <span style="color:#ffaa00;">📌 考えられる原因:</span><br>
                          ・動画が限定公開・削除されている<br>
                          ・Cobalt/Pipedが一時的にレート制限中（数分待って再試行）<br>
                          ・URLが正しいか確認してください`, 'error');

            } catch (err) {
                console.error(err);
                setStatus(`❌ 予期せぬエラー: ${err.message}`, 'error');
            } finally {
                downloadBtn.disabled = false;
                downloadBtn.textContent = '🚀 解析＆ダウンロード';
            }
        }

        // イベント
        downloadBtn.addEventListener('click', handleDownload);
        urlInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleDownload(); });
        urlInput.focus();
    })();
</script>
</body>
</html>
